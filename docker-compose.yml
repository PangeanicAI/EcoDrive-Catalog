version: "3.8"

services:
  ecodrive-catalog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecodrive-catalog
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - CATALOG_API_URL=${CATALOG_API_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
    restart: unless-stopped
    networks:
      - ecodrive-network

networks:
  ecodrive-network:
    driver: bridge
